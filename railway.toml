[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Persistent storage — add ONE volume in Railway UI:
#   /app/data  → covers both SurrealDB (/app/data/db/) and uploaded files
