[program:surrealdb]
command=surreal start --log info --user %(ENV_SURREAL_USER)s --pass %(ENV_SURREAL_PASSWORD)s rocksdb:/data/database.db
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=1
autostart=true
startsecs=2
